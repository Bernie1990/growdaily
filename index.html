<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語日俱進 - growdaily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .jp-text { font-family: 'Noto Serif JP', serif; }
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link.active { background-color: #f3e8ff; color: #6b21a8; font-weight: 500; }
    </style>
</head>
<body class="bg-zinc-100">
    <div class="flex h-screen">
        <!-- 側欄 -->
        <div class="w-72 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b">
                <div class="flex items-center gap-3">
                    <span class="text-4xl">🌸</span>
                    <div>
                        <span class="text-2xl font-bold text-violet-700">語日俱進</span>
                        <span class="block text-xs text-pink-500 -mt-1">TOOLBOOK</span>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 overflow-auto p-3">
                <div onclick="switchPage('home')" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1">
                    <span class="text-lg">🏠</span>
                    <span>首頁</span>
                </div>
                <div onclick="switchPage('hiki')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1">
                    <span class="text-lg">🌸</span>
                    <span>助數詞 - 匹（ひき）</span>
                </div>
                <div onclick="switchPage('godan')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1">
                    <span class="text-lg">📋</span>
                    <span>五段動詞與て形</span>
                </div>
                <div onclick="switchPage('resources')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer">
                    <span class="text-lg">📚</span>
                    <span>推薦學習網站</span>
                </div>
            </div>
            
            <div class="p-4 text-xs text-gray-400 border-t">
                growdaily • 資料來自 data/ 資料夾
            </div>
        </div>

        <!-- 主內容區 -->
        <div class="flex-1 overflow-auto bg-zinc-50 p-10" id="main-content">
            <!-- JavaScript will fill this -->
        </div>
    </div>

    <script>
        const pages = {
            home: `
                <div class="max-w-2xl">
                    <h1 class="text-5xl font-bold text-violet-700 mb-6">歡迎來到語日俱進工具書</h1>
                    <p class="text-xl text-gray-600">這裡收集了結構化的日文學習內容，幫助你從零開始系統學習。</p>
                    <p class="mt-8 text-sm text-gray-500">點擊左側欄目即可切換不同章節</p>
                </div>
            `,

            godan: `
                <div>
                    <h1 class="text-4xl font-bold mb-8">五段動詞與て形音變總整理</h1>
                    <div class="prose text-lg">
                        <p class="text-2xl text-violet-700 mb-10">日語て形的變化看似不規則，但其實可以用兩個音韻機制理解：</p>
                        <div class="grid grid-cols-2 gap-8 mb-12">
                            <div class="bg-purple-50 p-6 rounded-3xl">
                                <strong class="block text-purple-700 mb-2">1. 連濁（れんだく）</strong>
                                清音變濁音，讓兩個音節更容易連接
                            </div>
                            <div class="bg-pink-50 p-6 rounded-3xl">
                                <strong class="block text-pink-700 mb-2">2. 鼻音化</strong>
                                子音自然變成「ん」
                            </div>
                        </div>
                        <h3 class="font-bold text-2xl mb-6">て形變化總表</h3>
                        <table class="w-full border-collapse text-left text-base">
                            <tr class="bg-gray-100"><th class="p-4">結尾</th><th class="p-4">て形</th><th class="p-4">音變類型</th></tr>
                            <tr class="border-b"><td class="p-4">く</td><td class="jp-text p-4">いて</td><td class="p-4">イ音便</td></tr>
                            <tr class="border-b"><td class="p-4">ぐ</td><td class="jp-text p-4">いで</td><td class="p-4">連濁</td></tr>
                            <tr class="border-b"><td class="p-4">む・ぶ・ぬ</td><td class="jp-text p-4">んで</td><td class="p-4">鼻音化</td></tr>
                            <tr class="border-b"><td class="p-4">つ・る・う</td><td class="jp-text p-4">って</td><td class="p-4">促音便</td></tr>
                        </table>
                    </div>
                </div>
            `,

            hiki: `
                <div>
                    <h1 class="text-4xl font-bold mb-6 jp-text">匹（ひき）</h1>
                    <p class="text-xl text-pink-600 mb-8">用來數小動物、魚、昆蟲的助數詞</p>
                    <div class="bg-white p-8 rounded-3xl">
                        <h3 class="font-bold mb-6">必背特殊形</h3>
                        <p class="text-4xl jp-text text-pink-500">いっぴき・さんびき・ろっぴき・はっぴき</p>
                    </div>
                </div>
            `,

            resources: `
                <div>
                    <h1 class="text-4xl font-bold mb-8">推薦學習網站</h1>
                    <div class="space-y-6">
                        <div class="bg-white p-8 rounded-3xl">
                            <h3 class="font-bold">1. にほんごのふね</h3>
                            <p class="text-gray-600">文法與日本文化說明非常詳細</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl">
                            <h3 class="font-bold">2. NHK News Easy</h3>
                            <p class="text-gray-600">每天閱讀簡易新聞，練習閱讀能力</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl">
                            <h3 class="font-bold">3. ひろがるにほんご</h3>
                            <p class="text-gray-600">主題式學習</p>
                        </div>
                        <div class="bg-white p-8 rounded-3xl">
                            <h3 class="font-bold">4. Marugoto</h3>
                            <p class="text-gray-600">日本官方教材網站</p>
                        </div>
                    </div>
                </div>
            `
        };

        function switchPage(page) {
            document.getElementById('main-content').innerHTML = pages[page] || pages.home;
            
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('onclick').includes("'" + page + "'")) {
                    link.classList.add('active');
                }
            });
        }

        window.onload = () => {
            switchPage('home');
        };
    </script>
</body>
</html>
